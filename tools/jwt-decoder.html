<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder — BreachFocus Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="../assets/theme.css">
<style>
textarea,input[type=text]{font-family:var(--font-mono);background:var(--bg-dark);color:#E2E8F0}
textarea::placeholder,input::placeholder{color:rgba(255,255,255,.25)}
.demo-link{font-size:13px;color:var(--accent);cursor:pointer;text-decoration:underline}

/* JWT specific */
.jwt-input{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:var(--rs);font-family:var(--mono);font-size:13px;background:var(--bg-dark);color:#E2E8F0;outline:none;min-height:80px;word-break:break-all;resize:vertical;transition:border-color .2s}
.jwt-input:focus{border-color:var(--accent)}
.jwt-parts{display:flex;gap:4px;margin:12px 0;flex-wrap:wrap;font-family:var(--mono);font-size:13px;word-break:break-all}
.jwt-header-part{color:#FB7185}
.jwt-payload-part{color:#34D399}
.jwt-sig-part{color:#60A5FA}
.dot{color:rgba(255,255,255,.4)}
.json-block{background:var(--bg-dark);border-radius:var(--rs);padding:16px;font-family:var(--mono);font-size:12px;line-height:1.8;overflow-x:auto;margin-top:12px}
.json-key{color:#93C5FD}
.json-str{color:#86EFAC}
.json-num{color:#FCD34D}
.json-bool{color:#FB7185}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-m);margin:16px 0 8px}
.badge-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600}
.badge-pill.warn{background:var(--aml);color:var(--amber)}
.badge-pill.pass{background:var(--gl);color:var(--green)}
.badge-pill.fail{background:var(--rl);color:var(--red)}
.badge-pill.info{background:var(--al);color:var(--accent)}
.claim-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.claim-row:last-child{border-bottom:none}
.claim-key{font-family:var(--mono);color:var(--text-s);width:80px;flex-shrink:0}
.claim-val{font-family:var(--mono);flex:1;word-break:break-all}
.claim-note{font-size:12px;margin-left:auto;flex-shrink:0}

</style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="nav-logo"><div class="logo-icon">BF</div>BreachFocus</a>
  <a href="index.html" class="nav-back"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>All tools</a>
</div></nav>

<div class="hero">
  <div class="badge badge-blue">⚡ Dev &amp; Crypto</div>
  <h1>JWT Decoder</h1>
  <p>Decode and inspect JSON Web Tokens. Visualize header, payload and claims, check expiry, and detect common misconfigurations — fully client-side.</p>
</div>

<div class="body">
  <div class="panel">
    <div class="ph"><div class="pt">Paste JWT Token</div><span class="demo-link" onclick="loadDemo()">load example</span></div>
    <div class="pb">
      <textarea class="jwt-input" id="jwtInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." oninput="decode()"></textarea>
    </div>
  </div>

  <div id="jwtResults"></div>
</div>

<script>
const DEMO_JWT = 'eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiZW1haWwiOiJqb2huQGV4YW1wbGUuY29tIiwicm9sZSI6ImFkbWluIiwiaWF0IjoxNTE2MjM5MDIyLCJleHAiOjE1MTYyMzk5MjIsImlzcyI6Imh0dHA6Ly9hdXRoLmludGVybmFsIiwiYXVkIjoiaHR0cDovL2FwaS5pbnRlcm5hbCJ9.';
function loadDemo() { document.getElementById('jwtInput').value = DEMO_JWT; decode(); }

function b64url(s) {
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length % 4) s += '=';
  try { return JSON.parse(atob(s)); } catch(e) { return null; }
}

function highlightJSON(obj) {
  return JSON.stringify(obj, null, 2)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span>:')
    .replace(/: "([^"]*)"/g,': <span class="json-str">"$1"</span>')
    .replace(/: (\d+)/g,': <span class="json-num">$1</span>')
    .replace(/: (true|false|null)/g,': <span class="json-bool">$1</span>');
}

function tsStr(ts) { try { return new Date(ts*1000).toUTCString(); } catch(e) { return ts; } }
function now() { return Math.floor(Date.now()/1000); }

function decode() {
  const raw = document.getElementById('jwtInput').value.trim();
  if(!raw) { document.getElementById('jwtResults').innerHTML=''; return; }

  const parts = raw.split('.');
  if(parts.length < 2) { document.getElementById('jwtResults').innerHTML='<div style="background:var(--rl);border-radius:var(--rs);padding:14px;color:var(--red);font-size:14px">Invalid JWT — must have at least 2 parts separated by dots.</div>'; return; }

  const header = b64url(parts[0]);
  const payload = b64url(parts[1]);
  const hasSig = parts.length === 3 && parts[2].length > 0;

  if(!header || !payload) { document.getElementById('jwtResults').innerHTML='<div style="background:var(--rl);border-radius:var(--rs);padding:14px;color:var(--red);font-size:14px">Could not decode JWT — invalid base64url encoding.</div>'; return; }

  // Security analysis
  const findings = [];
  const alg = header.alg || '';
  if(alg.toLowerCase()==='none') findings.push({ sev:'critical', title:'Algorithm: none', desc:'alg=none means NO signature verification. Any payload can be accepted. Never accept unsigned JWTs.' });
  if(/^hs/i.test(alg)) findings.push({ sev:'warn', title:'Symmetric algorithm (HMAC)', desc:`${alg} uses a shared secret. If the secret is weak or leaked, tokens can be forged.` });
  if(/^rs|^es|^ps/i.test(alg)) findings.push({ sev:'info', title:'Asymmetric algorithm', desc:`${alg} uses public/private key pair — stronger than HMAC.` });

  const exp = payload.exp, iat = payload.iat, nbf = payload.nbf;
  const n = now();
  if(!exp) findings.push({ sev:'warn', title:'No expiry (exp) claim', desc:'Token never expires. Compromised tokens remain valid indefinitely.' });
  else if(exp < n) findings.push({ sev:'critical', title:'Token is EXPIRED', desc:`Expired ${Math.round((n-exp)/60)} minutes ago (${tsStr(exp)})` });
  else findings.push({ sev:'pass', title:`Token valid for ${Math.round((exp-n)/60)} more minutes`, desc:`Expires: ${tsStr(exp)}` });

  if(payload.role==='admin'||payload.role==='superuser'||payload.isAdmin) findings.push({ sev:'warn', title:'Admin/elevated role in payload', desc:'Token carries an elevated role claim. Ensure server-side validation enforces this properly.' });
  if(!hasSig) findings.push({ sev:'critical', title:'No signature present', desc:'The token has no signature (3rd part missing). Cannot verify authenticity.' });

  const claimOrder = ['sub','name','email','role','iss','aud','iat','exp','nbf','jti'];
  const payloadKeys = Object.keys(payload);
  const orderedClaims = [...claimOrder.filter(k=>payload[k]!==undefined), ...payloadKeys.filter(k=>!claimOrder.includes(k))];

  document.getElementById('jwtResults').innerHTML = `
    <div class="panel">
      <div class="ph"><div class="pt">Security Analysis</div></div>
      <div class="pb">${findings.map(f=>`
        <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          <span class="badge-pill ${f.sev==='critical'?'fail':f.sev==='pass'?'pass':f.sev==='warn'?'warn':'info'}">${f.sev==='pass'?'OK':f.sev.toUpperCase()}</span>
          <div><div style="font-size:13px;font-weight:600">${f.title}</div><div style="font-size:12px;color:var(--text-s)">${f.desc}</div></div>
        </div>`).join('')}</div>
    </div>

    <div class="panel">
      <div class="ph"><div class="pt">Header</div><span style="font-size:12px;color:var(--text-m);font-family:var(--mono)">${alg}</span></div>
      <div class="pb"><div class="json-block">${highlightJSON(header)}</div></div>
    </div>

    <div class="panel">
      <div class="ph"><div class="pt">Payload Claims</div></div>
      <div class="pb">
        ${orderedClaims.map(k=>{
          const v = payload[k];
          let note='', noteClass='info';
          if(k==='exp'){ note=exp<n?'EXPIRED':tsStr(v); noteClass=exp<n?'fail':'pass'; }
          else if(k==='iat') note=tsStr(v);
          else if(k==='nbf') note=tsStr(v);
          else if(k==='iss') note='issuer';
          else if(k==='aud') note='audience';
          else if(k==='sub') note='subject';
          else if(k==='jti') note='token id';
          const display = typeof v === 'object' ? JSON.stringify(v) : String(v);
          return `<div class="claim-row">
            <span class="claim-key">${k}</span>
            <span class="claim-val">${display}</span>
            ${note?`<span class="claim-note badge-pill ${noteClass}">${note}</span>`:''}
          </div>`;
        }).join('')}
        <div class="section-label">Raw payload</div>
        <div class="json-block">${highlightJSON(payload)}</div>
      </div>
    </div>

    <div class="panel">
      <div class="ph"><div class="pt">Signature</div></div>
      <div class="pb">
        ${hasSig
          ? `<div class="json-block" style="color:#60A5FA;word-break:break-all">${parts[2]}</div><div style="font-size:13px;color:var(--text-s);margin-top:10px">⚠ Signature verification requires the secret/public key and cannot be done client-side. Use a trusted server-side library.</div>`
          : `<div style="background:var(--rl);border-radius:var(--rs);padding:12px 14px;color:var(--red);font-size:13px">No signature present — this token is unsigned.</div>`}
      </div>
    </div>`;
}
</script>
</body>
</html>
